<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title and Logo -->
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">


    <!-- Tailwind+ DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- stylesheet -->
     <style>
        *{
            font-family: "Geist", sans-serif;
        }
     </style>

</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">

    <div class="card bg-base-100 w-full max-w-md shadow-xl rounded-2xl">
        <div class="card-body px-8 py-8">

            <!-- Logo -->
            <div class="text-center">
                <img class="w-16 mx-auto mb-4" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-sm text-gray-500">
                    Sign in to manage your issues
                </p>
            </div>

            <!-- Username -->
            <div class="mt-6">
                <label class="label">
                    <span class="label-text font-semibold">Username</span>
                </label>

                <input
                    id="input-number"
                    type="text"
                    placeholder="Enter Username"
                    class="input input-bordered w-full rounded-xl">

                <p class="text-xs text-purple-600 mt-1">
                    Default: admin
                </p>
            </div>

            <!-- Password -->
            <div class="mt-4">
                <label class="label">
                    <span class="label-text font-semibold">Password</span>
                </label>

                <input
                    id="input-password"
                    type="password"
                    placeholder="Enter Password"
                    class="input input-bordered w-full rounded-xl">

                <p class="text-xs text-purple-600 mt-1">
                    Default: admin123
                </p>
            </div>

            <!-- Button -->
            <button
                id="signin-btn"
                class="btn btn-primary w-full rounded-xl mt-6">
                Sign In
            </button>

            <!-- OR -->
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-gray-300"></div>
                <span class="mx-4 text-sm text-gray-500">OR</span>
                <div class="flex-1 h-px bg-gray-300"></div>
            </div>

            <!-- Demo Credentials -->
            <div>
                <p class="text-center text-sm text-gray-500 mb-3">
                    Demo Credentials:
                </p>

                <div class="bg-base-200 rounded-xl p-5 text-center">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
